<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 280px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      background: #fff;
    }
    h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
      color: #262626;
      border-bottom: 1px solid #dbdbdb;
      padding-bottom: 8px;
    }
    .post {
      background: #fafafa;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #efefef;
    }
    .post-number {
      font-weight: 600;
      font-size: 13px;
      color: #0095f6;
      margin-bottom: 5px;
    }
    .days {
      font-size: 18px;
      font-weight: 700;
      color: #262626;
    }
    .days-unit {
      font-size: 12px;
      font-weight: normal;
      color: #8e8e8e;
    }
    .date {
      font-size: 11px;
      color: #8e8e8e;
      margin-top: 5px;
    }
    .error {
      color: #ed4956;
      font-size: 13px;
      text-align: center;
      padding: 15px;
    }
    .loading {
      text-align: center;
      padding: 20px;
      color: #8e8e8e;
      font-size: 13px;
    }
    .refresh-btn {
      width: 100%;
      padding: 8px;
      background: #0095f6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      margin-top: 5px;
    }
    .refresh-btn:hover {
      background: #0077cc;
    }
    .note {
      font-size: 10px;
      color: #8e8e8e;
      text-align: center;
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid #dbdbdb;
    }
  </style>
</head>
<body>
  <h3>📸 Last 3 Posts</h3>
  <div id="content">
    <div class="loading">Loading...</div>
  </div>
  <button class="refresh-btn" id="refresh">⟳ Refresh</button>
  <div class="note">Open the Instagram profile tab first</div>

  <script src="popup.js"></script>
</body>
</html>
